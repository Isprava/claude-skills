# =============================================================================
# PERFORMANCE STATUS THRESHOLDS
# =============================================================================

status_thresholds:
  excellent:
    vs_benchmark: 1.20  # 20% above benchmark
    description: "Significantly above benchmark"
  strong:
    vs_benchmark: 1.00  # At or above benchmark
    description: "At or above benchmark"
  moderate:
    vs_benchmark: 0.85  # Up to 15% below
    description: "Slightly below benchmark"
  needs_attention:
    vs_benchmark: 0.70  # 15-30% below
    description: "Significantly below benchmark"
  critical:
    vs_benchmark: 0.0   # More than 30% below
    description: "Critical - requires immediate action"

# =============================================================================
# TREND INTERPRETATION
# =============================================================================

trend_thresholds:
  significant_improvement:
    change_percent: 15
    direction: "positive"
  moderate_improvement:
    change_percent: 5
    direction: "positive"
  stable:
    change_percent: 5
    direction: "either"
  moderate_decline:
    change_percent: -5
    direction: "negative"
  significant_decline:
    change_percent: -15
    direction: "negative"

# =============================================================================
# SEASONAL ADJUSTMENTS
# =============================================================================

seasonality:
  ecommerce:
    peak_months: [10, 11, 12]  # Oct-Dec (festive, year-end)
    low_months: [1, 2, 6, 7]   # Post-festive, summer
    adjustment_factor:
      peak: 1.3
      normal: 1.0
      low: 0.75

  b2b:
    peak_months: [1, 3, 9, 10]  # Q1 budgets, Q3/Q4 planning
    low_months: [7, 8, 12]      # Summer lull, holidays
    adjustment_factor:
      peak: 1.15
      normal: 1.0
      low: 0.85

  real_estate:
    peak_months: [10, 11, 12, 1, 2, 3]  # Post-monsoon to March
    low_months: [6, 7, 8, 9]             # Monsoon
    adjustment_factor:
      peak: 1.25
      normal: 1.0
      low: 0.70
